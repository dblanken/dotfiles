# ============================================================================
# Tmux Configuration
# ============================================================================
# Managed via dotfiles with GNU Stow
# Based on TokyoNight color scheme with custom optimizations
# Minimum tmux version: 3.2
# ============================================================================

# ----------------------------------------------------------------------------
# Core Settings
# ----------------------------------------------------------------------------

# Set prefix to Ctrl+Space (more ergonomic than Ctrl+b)
unbind-key C-b
set-option -g prefix C-Space
bind C-Space send-prefix

# Start window and pane numbering at 1 (0 is too hard to reach)
set-option -g base-index 1
set-option -g pane-base-index 1

# Automatically renumber windows when one is closed
set-option -g renumber-windows on

# Don't wait for escape sequence after prefix
set-option -s escape-time 0

# Increase history buffer
set-option -g history-limit 10000

# Enable focus events for better vim integration
set-option -g focus-events on

# Allow passthrough for image display and OSC sequences
set-option -g allow-passthrough on

# ----------------------------------------------------------------------------
# Display & Terminal Settings
# ----------------------------------------------------------------------------

# 256 color support with true color (24-bit)
set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ',*256col*:Tc,alacritty:Tc,*kitty:Tc'

# Dynamically update terminal title
set-option -g set-titles on
set-option -g set-titles-string "#S > #T"

# Automatically rename windows based on current command
set-option -w -g automatic-rename on

# Don't wrap searches (confusing with reverse position info)
set-option -w -g wrap-search off

# ----------------------------------------------------------------------------
# Mouse & Keyboard Settings
# ----------------------------------------------------------------------------

# Enable mouse support
set-option -g mouse on

# Enable vi keys
set-option -g mode-keys vi
set-option -g status-keys vi

# Enable xterm keys
set-option -w -g xterm-keys on

# ----------------------------------------------------------------------------
# Window & Pane Management
# ----------------------------------------------------------------------------

# Open new windows and panes in current path
unbind-key c
bind-key c new-window -c '#{pane_current_path}'

# Intuitive pane splitting
unbind-key %
bind-key % split-window -h -c '#{pane_current_path}'
bind-key | split-window -h -c '#{pane_current_path}'
bind-key '\' split-window -h -c '#{pane_current_path}'

unbind-key '"'
bind-key '"' split-window -v -c '#{pane_current_path}'
bind-key - split-window -v -c '#{pane_current_path}'

# Move between panes with Prefix h,j,k,l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Quick layout recovery (Prefix p)
# Useful after accidentally hitting space which trashes layout
bind-key p select-layout -o

# Move windows left/right
bind-key -r '<' swap-window -d -t '{previous}'
bind-key -r '>' swap-window -d -t '{next}'

# Pane layout width optimization for code editing
# Enough for 3-digit line numbers + 80 columns + breathing room
set-option -w -g main-pane-width 85

# ----------------------------------------------------------------------------
# Smart Vim-Tmux Navigation
# ----------------------------------------------------------------------------
# Seamless navigation between tmux panes and vim splits
# Requires: christoomey/vim-tmux-navigator plugin

is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\' 'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\' 'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# Ctrl+Space twice to switch to last session
bind-key C-Space switch-client -l

# ----------------------------------------------------------------------------
# Copy Mode Settings
# ----------------------------------------------------------------------------

# Enter copy mode with Escape
bind Escape copy-mode

# Vi-style selection and copying
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection

# Copy to system clipboard (cross-platform via clipboard script)
bind-key y run-shell "tmux save-buffer - | ~/.local/bin/clipboard copy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "~/.local/bin/clipboard copy"

# Stay in copy mode on drag end
unbind-key -T copy-mode-vi MouseDragEnd1Pane

# Scroll 3 lines at a time with mouse wheel
bind-key -T copy-mode-vi WheelUpPane select-pane\; send-keys -t'{mouse}' -X clear-selection\; send-keys -t'{mouse}' -X -N 3 scroll-up
bind-key -T copy-mode-vi WheelDownPane select-pane\; send-keys -t'{mouse}' -X clear-selection\; send-keys -t'{mouse}' -X -N 3 scroll-down

# Double and triple click support
bind-key -T root DoubleClick1Pane if-shell -Ft'{mouse}' '#{alternate_on}' "send-keys -M" "copy-mode -t'{mouse}'; send-keys -t'{mouse}' -X select-word"
bind-key -T root TripleClick1Pane if-shell -Ft'{mouse}' '#{alternate_on}' "send-keys -M" "copy-mode -t'{mouse}'; send-keys -t'{mouse}' -X select-line"
bind-key -T copy-mode-vi DoubleClick1Pane if-shell -Ft'{mouse}' '#{alternate_on}' "send-keys -M" "copy-mode -t'{mouse}'; send-keys -t'{mouse}' -X select-word"
bind-key -T copy-mode-vi TripleClick1Pane if-shell -Ft'{mouse}' '#{alternate_on}' "send-keys -M" "copy-mode -t'{mouse}'; send-keys -t'{mouse}' -X select-line"

# Additional exit binding for copy mode
bind-key -T copy-mode-vi Escape send-keys -X cancel

# Search bindings (incremental)
bind-key -T copy-mode-vi / command-prompt -i -p "search down" "send -X search-forward-incremental \"%%%\""
bind-key -T copy-mode-vi ? command-prompt -i -p "search up" "send -X search-backward-incremental \"%%%\""

# Search back to last prompt - useful with zsh/bash prompt symbols
# Searches for ❯ character (adjust if your prompt uses different symbol)
bind-key b copy-mode\; send-keys -X start-of-line\; send-keys -X search-backward "❯"\; send-keys -X next-word

# Add : and / to word separators (in addition to default " -_@")
set-option -ga word-separators :/

# ----------------------------------------------------------------------------
# TokyoNight Color Scheme
# ----------------------------------------------------------------------------

# Copy mode styling
set-option -g mode-style "fg=#7aa2f7,bg=#3b4261"

# Command prompt styling
set-option -g message-style "fg=#7aa2f7,bg=#3b4261"
set-option -g message-command-style "fg=#7aa2f7,bg=#3b4261"

# Pane borders
set-option -g pane-border-style "fg=#3b4261"
set-option -g pane-active-border-style "fg=#7aa2f7"

# Pane border indicators (when displaying numbers with prefix+q)
set-option -g display-panes-active-colour colour02
set-option -g display-panes-colour colour03

# Clock mode (prefix + t)
set-window-option -g clock-mode-colour colour02
set-window-option -g clock-mode-style 12

# Bell notification styling
set-window-option -g window-status-bell-style fg=yellow,bold,underscore

# Turn off distracting active border highlight
set-option -ga pane-active-border-style bg=default,fg=default

# ----------------------------------------------------------------------------
# Status Line Configuration
# ----------------------------------------------------------------------------

set-option -g status "on"
set-option -g status-justify "left"
set-option -g status-style "fg=#7aa2f7,bg=#16161e"

set-option -g status-left-length 100
set-option -g status-right-length 100

set-option -g status-left-style NONE
set-option -g status-right-style NONE

# Status left: Session name
set-option -g status-left "#[fg=#15161e,bg=#7aa2f7,bold] #S #[fg=#7aa2f7,bg=#16161e,nobold,nounderscore,noitalics]"

# Status right: Time, date, and hostname
set-option -g status-right "#[fg=#16161e,bg=#16161e,nobold,nounderscore,noitalics]#[fg=#7aa2f7,bg=#16161e] #{prefix_highlight} #[fg=#3b4261,bg=#16161e,nobold,nounderscore,noitalics]#[fg=#7aa2f7,bg=#3b4261] %Y-%m-%d  %I:%M %p #[fg=#7aa2f7,bg=#3b4261,nobold,nounderscore,noitalics]#[fg=#15161e,bg=#7aa2f7,bold] #h "

# Adjust for 24-hour clock if configured
if-shell '[ "$(tmux show-option -gqv "clock-mode-style")" == "24" ]' {
  set-option -g status-right "#[fg=#16161e,bg=#16161e,nobold,nounderscore,noitalics]#[fg=#7aa2f7,bg=#16161e] #{prefix_highlight} #[fg=#3b4261,bg=#16161e,nobold,nounderscore,noitalics]#[fg=#7aa2f7,bg=#3b4261] %Y-%m-%d  %H:%M #[fg=#7aa2f7,bg=#3b4261,nobold,nounderscore,noitalics]#[fg=#15161e,bg=#7aa2f7,bold] #h "
}

# Window status styling
set-window-option -g window-status-activity-style "underscore,fg=#a9b1d6,bg=#16161e"
set-window-option -g window-status-separator ""
set-window-option -g window-status-style "NONE,fg=#a9b1d6,bg=#16161e"

# Inactive windows
set-window-option -g window-status-format "#[fg=#16161e,bg=#16161e,nobold,nounderscore,noitalics]#[default] #I  #W #F #[fg=#16161e,bg=#16161e,nobold,nounderscore,noitalics]"

# Active window
set-window-option -g window-status-current-format "#[fg=#16161e,bg=#3b4261,nobold,nounderscore,noitalics]#[fg=#7aa2f7,bg=#3b4261,bold] #I  #W #F #[fg=#3b4261,bg=#16161e,nobold,nounderscore,noitalics]"

# Default window title colors (fallback)
set-window-option -g window-status-style 'bg=default,fg=colour20'
set-window-option -g window-status-current-style 'bg=default,fg=colour07'

# Highlight active window
set-option -w -g window-status-current-style bg=red

# Status bar update interval
set-option -g status-interval 1

# ----------------------------------------------------------------------------
# Copy Mode Pane Border Info
# ----------------------------------------------------------------------------
# Show copy mode status and search results in pane border

%hidden IS_COPY_MODE="#{==:#{pane_mode},copy-mode}"
%hidden COPY_MODE_MARKER="#[align=left#,fg=green#,bg=black]  -- COPY --  #[default]"
%hidden COPY_MODE_LEFT="$COPY_MODE_MARKER"
%hidden HAS_SEARCH_RESULT="#{&&:#{e|>|:#{search_count},0},#{search_present}}"
%hidden RESULT_OR_RESULTS="result#{?#{==:#{search_count},1},,s}"
%hidden RESULT_COUNT_IS_PARTIAL="#{e|>|:#{search_count_partial},0}"
%hidden SEARCH_RESULT_COUNT="(#{search_count}#{?$RESULT_COUNT_IS_PARTIAL,+,} $RESULT_OR_RESULTS)"
%hidden OFFSET_FROM_TOP="#{e|-|:#{history_size},#{scroll_position}}"
%hidden COPY_MODE_LOCATION="[$OFFSET_FROM_TOP/#{history_size}]"
%hidden COPY_MODE_CENTER="#[align=centre#,bg=black]#[default]"
%hidden COPY_MODE_RIGHT="#[align=right#,bg=black]  #{?$HAS_SEARCH_RESULT,$SEARCH_RESULT_COUNT  ,}$COPY_MODE_LOCATION  #[default]"

set-option -g pane-border-format "#{?$IS_COPY_MODE,$COPY_MODE_LEFT$COPY_MODE_CENTER$COPY_MODE_RIGHT,}"
set-option -g pane-border-style 'fg=colour18'
set-option -g pane-active-border-style 'fg=colour19'

# ----------------------------------------------------------------------------
# Utility Bindings
# ----------------------------------------------------------------------------

# Reload configuration
bind r source-file ~/.tmux.conf \; display ".tmux.conf reloaded!"

# Clear history (analogous to Ctrl+l for terminal)
bind-key C-l clear-history

# ----------------------------------------------------------------------------
# Environment
# ----------------------------------------------------------------------------

# Ensure SHLVL starts at 1 even from wrapper scripts
set-environment -g SHLVL 1

# ----------------------------------------------------------------------------
# Plugin Configuration (TPM - Tmux Plugin Manager)
# ----------------------------------------------------------------------------
# Install TPM first:
#   git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
#
# Key bindings after TPM is loaded:
#   prefix + I       Install plugins
#   prefix + U       Update plugins
#   prefix + alt + u Uninstall plugins not in list

# Plugin declarations
set-option -g @plugin 'tmux-plugins/tpm'
set-option -g @plugin 'tmux-plugins/tmux-sensible'
set-option -g @plugin 'tmux-plugins/tmux-copycat'
set-option -g @plugin 'tmux-plugins/tmux-cpu'
set-option -g @plugin 'tmux-plugins/tmux-resurrect'
set-option -g @plugin 'tmux-plugins/tmux-continuum'
set-option -g @plugin 'christoomey/vim-tmux-navigator'

# Plugin-specific settings

# tmux-continuum: Auto-restore sessions on tmux start
set-option -g @continuum-restore 'on'

# tmux-resurrect: What to save/restore
set-option -g @resurrect-capture-pane-contents 'on'
set-option -g @resurrect-strategy-vim 'session'

# tmux-cpu: Display in status line (if desired)
# Example: set -g status-right '#{cpu_bg_color} CPU: #{cpu_icon} #{cpu_percentage} | %a %h-%d %H:%M '

# tmux-prefix-highlight: Styling
set-option -g @prefix_highlight_output_prefix "#[fg=#e0af68]#[bg=#16161e]#[fg=#16161e]#[bg=#e0af68]"
set-option -g @prefix_highlight_output_suffix ""

# ----------------------------------------------------------------------------
# Initialize TPM (keep this at the very bottom)
# ----------------------------------------------------------------------------
run '~/.tmux/plugins/tpm/tpm'
